version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - ./backend/.env
    environment:
      # Mount the repo root at /framework so main.sh and modules/ are accessible.
      - FRAMEWORK_DIR=/framework
    volumes:
      - ./:/framework:ro            # whole repo read-only (bash scripts + config)
      - ./results:/framework/results # writable results dir for scan outputs
      - ./backend/database:/app/database
      - ./backend/reports:/app/reports
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped
