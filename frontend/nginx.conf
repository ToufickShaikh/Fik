server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip for performance
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 256;

    # REST API — proxy to backend service
    location /api/ {
        proxy_pass         http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 180s;
    }

    # WebSocket log stream — proxy with upgrade headers
    location /ws/ {
        proxy_pass             http://backend:3000;
        proxy_http_version     1.1;
        proxy_set_header       Upgrade    $http_upgrade;
        proxy_set_header       Connection "upgrade";
        proxy_set_header       Host       $host;
        proxy_read_timeout     86400s;  # keep WS open for long-running scans
        proxy_send_timeout     86400s;
    }

    # SPA fallback — all unmatched paths serve index.html (React Router)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
